# Runs the samples against a real CosmosDB, with no local .NET or Aspire tooling needed:
#
#   docker compose up --build
#
#   Web API   http://localhost:8080/healthie        (REST, /healthie/mcp, /healthie/live, /healthie/ready)
#   Dashboard http://localhost:8081/healthie/dashboard
#
# The samples also run with no CosmosDB at all -- they fall back to the in-memory state provider when
# no connection string is set. This file is for exercising the durable path.

services:
  # The Linux emulator, rather than the Windows one, so this works the same on a developer machine
  # and on CI.
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: healthie-cosmos
    ports:
      - "8082:8081"
    environment:
      PROTOCOL: https
    healthcheck:
      # The emulator answers on this port only once it is ready to serve, which is what gates the
      # samples below.
      test: ["CMD-SHELL", "curl -k -f https://localhost:8081/_explorer/emulator.pem || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  webapi:
    build:
      context: .
      dockerfile: samples/Healthie.Sample.WebApi/Dockerfile
    container_name: healthie-webapi
    depends_on:
      cosmos:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CosmosDb: "AccountEndpoint=https://cosmos:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;DisableServerCertificateValidation=True"

  dashboard:
    build:
      context: .
      dockerfile: samples/Healthie.Sample.BlazorUI/Dockerfile
    container_name: healthie-dashboard
    depends_on:
      cosmos:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CosmosDb: "AccountEndpoint=https://cosmos:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;DisableServerCertificateValidation=True"
