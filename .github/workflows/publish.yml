name: Release

# Two ways in:
#   - Actions -> Release -> "Run workflow", enter a version. Tags the commit for you.
#   - Push a v* tag, as before.
# Either way the packages are built, tested, published to NuGet.org, and attached to a GitHub
# release. Tick "dry run" to build and pack without publishing anything.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without a leading v (for example 3.0.0 or 3.0.0-preview.1)"
        required: true
        type: string
      dry_run:
        description: "Dry run: build, test, and pack only. Nothing is tagged or published."
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # Lets this workflow ask GitHub for the signed OIDC token that NuGet.org trades for a
  # short-lived publishing key. Without it the login step below cannot get a token at all.
  id-token: write

env:
  CONFIGURATION: Release
  NUPKG_DIR: ./nupkgs

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The 10.0 SDK builds every target framework the libraries ship for; the 8.0 runtime is
      # needed to also run the tests against net8.0 before publishing.
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          # Reject anything NuGet would not accept, before a partial release is published.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::'$VERSION' is not a valid version. Expected 3.0.0 or 3.0.0-preview.1 (no leading v)."
            exit 1
          fi

          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi

          {
            echo "VERSION=$VERSION"
            echo "TAG=v$VERSION"
            echo "PRERELEASE=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

          echo "Releasing $VERSION (prerelease: $PRERELEASE, dry run: ${{ inputs.dry_run || false }})"

      # A tag that already exists would mean publishing different bits under a version someone may
      # already have restored. Fail before anything is built.
      - name: Check the version is unreleased
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.TAG }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.TAG }} already exists. Pick a new version."
            exit 1
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >
          dotnet build
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:ContinuousIntegrationBuild=true

      # The end-to-end tests drive a real browser, so Chromium has to be on the runner before the
      # gate below can run them.
      - name: Install Chromium
        run: pwsh tests/Healthie.Tests.E2E/bin/${{ env.CONFIGURATION }}/net8.0/playwright.ps1 install chromium --with-deps

      # The whole suite, unit and end-to-end, gates the release: nothing is packed, tagged, or
      # published unless the dashboard itself is proven to work in a browser first.
      - name: Test
        run: >
          dotnet test
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --verbosity normal

      - name: Pack
        run: >
          dotnet pack
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ${{ env.NUPKG_DIR }}
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      # Attached to the workflow run, so a dry run still leaves something to inspect.
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ env.NUPKG_DIR }}/*.nupkg
            ${{ env.NUPKG_DIR }}/*.snupkg
          if-no-files-found: error

      # Trusted publishing: NuGet.org trades GitHub's signed OIDC token for a key that lives one
      # hour, rather than this repository holding a long-lived one. Requested here, immediately
      # before the pushes, because that hour starts now -- asking any earlier risks it expiring
      # behind a slow test run.
      # Requires a policy on nuget.org naming this repository and `publish.yml`.
      # Runs on dry runs too, deliberately: the policy is the likeliest thing to be wrong, and a
      # rehearsal that skipped it would prove everything except the part worth rehearsing. On a dry
      # run the key simply goes unused and expires.
      - name: Get a publishing key from NuGet.org
        id: nuget_login
        uses: NuGet/login@v1
        with:
          # The nuget.org profile name, not an email address. Not a secret: it is on every package
          # page already. Keeping it in the open means a missing secret cannot silently break a
          # release.
          user: ivanvyd

      # Publishing is the step that cannot be undone, so it goes first: everything after it is
      # cheap and repeatable. Tagging first would leave a tag behind whenever a push failed, and
      # "Check the version is unreleased" would then refuse to retry that same version -- turning a
      # transient failure into a version that can never be released.
      # --skip-duplicate lets a retry get past packages an earlier attempt already pushed.
      # This pushes the symbols too: `dotnet nuget push` uploads each .snupkg sitting next to its
      # .nupkg unless --no-symbols is passed. A second step for *.snupkg only re-pushes what this
      # one already sent, and 3.0.0 proved it -- eight `Conflict ... already exists` errors that
      # were survivable only because that step carried continue-on-error.
      - name: Publish to NuGet.org
        if: ${{ !inputs.dry_run }}
        run: >
          dotnet nuget push "${{ env.NUPKG_DIR }}/*.nupkg"
          --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # Only now that the packages are actually on NuGet.org does the version become real.
      - name: Tag the release
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.TAG }}" -m "Healthie.NET ${{ steps.version.outputs.VERSION }}"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.version.outputs.PRERELEASE }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Release notes come straight from CHANGELOG.md, so the release, the tagged changelog, and
          # every package's PackageReleaseNotes link tell one story. Take the section for this
          # version; if it hasn't been renamed from "Unreleased" yet, take that; and if the changelog
          # has nothing, fall back to GitHub's generated notes rather than shipping an empty body.
          VER="${{ steps.version.outputs.VERSION }}"
          awk -v h="## [$VER]" 'index($0,h)==1{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            awk '/^## \[Unreleased\]/{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md > notes.md
          fi
          sed -i -e '/./,$!d' notes.md   # drop leading blank lines

          if [ -s notes.md ]; then
            NOTES_FLAG=(--notes-file notes.md)
            echo "Using release notes from CHANGELOG.md:"; cat notes.md
          else
            NOTES_FLAG=(--generate-notes)
            echo "No CHANGELOG entry found; using generated notes."
          fi

          gh release create "${{ steps.version.outputs.TAG }}" \
            ${{ env.NUPKG_DIR }}/*.nupkg \
            "${NOTES_FLAG[@]}" \
            $PRERELEASE_FLAG \
            --title "Healthie.NET ${{ steps.version.outputs.VERSION }}"

      # Last, so it reports what happened rather than what was about to be attempted.
      - name: Summarise
        run: |
          {
            echo "### Healthie.NET ${{ steps.version.outputs.VERSION }}"
            echo
            if [[ "${{ inputs.dry_run || false }}" == "true" ]]; then
              echo "**Dry run** — nothing was tagged or published. Packages are attached to this run."
            else
              echo "Published to NuGet.org and released as \`${{ steps.version.outputs.TAG }}\`."
            fi
            echo
            echo "| Package |"
            echo "|---|"
            for pkg in ${{ env.NUPKG_DIR }}/*.nupkg; do
              echo "| \`$(basename "$pkg")\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
